[supervisord]
nodaemon=true

[program:redis]
command=/usr/bin/redis-server
autorestart=true

[program:postfix]
command=/usr/sbin/postfix start-fg
autorestart=true

[program:dovecot]
command=/usr/sbin/dovecot -F
autorestart=true

[program:rspamd]
command=/usr/bin/rspamd -f -u root -g root
autorestart=true
