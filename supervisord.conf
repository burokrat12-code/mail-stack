[supervisord]
nodaemon=true

[program:redis]
command=/usr/bin/redis-server
autorestart=true

[program:init]
command=/etc/init.sh
autorestart=false
startsecs=0

[program:opendkim]
command=/bin/sh -c "sleep 10 && /usr/sbin/opendkim -f -x /etc/opendkim.conf"
autorestart=true

[program:postfix]
command=/usr/sbin/postfix start-fg
autorestart=true

[program:dovecot]
command=/usr/sbin/dovecot -F
autorestart=true

[program:rspamd]
command=/usr/bin/rspamd -f --insecure
autorestart=true
